# IntegrationTestScenario for Testing Farm
# Tests all factory components together in group snapshots
# Apply after Konflux onboarding: kubectl apply -f .tekton/integration/testing-farm-group.yaml
apiVersion: appstudio.redhat.com/v1beta2
kind: IntegrationTestScenario
metadata:
  name: factory-testing-farm
  namespace: rsturla-tenant  # e.g., rsturla-tenant
  labels:
    test.appstudio.openshift.io/optional: "false"  # Blocking test
spec:
  application: factory
  contexts:
    - name: group
      description: Test all factory components together (workqueue, codegen, rpm-builder)
    - name: component_workqueue
      description: Test workqueue component individually
  resolverRef:
    resolver: git
    params:
      - name: url
        value: https://gitlab.com/testing-farm/integrations-konflux
      - name: revision
        value: v3.21
      - name: pathInRepo
        value: pipeline/tmt-via-testing-farm/tmt-via-testing-farm.yaml
  params:
    - name: PIPELINE_MODE
      value: container
    - name: COMPOSE
      value: Fedora-43
    - name: ARCH
      value: x86_64
    - name: IMAGE_TAG
      value: v3.21
    - name: GIT_URL
      value: https://github.com/rsturla/factory
    - name: GIT_REF
      value: main
    - name: TMT_PATH
      value: workqueue
    - name: TMT_PLAN
      value: plans/factory-integration
    - name: HARDWARE
      value: |
        memory='>= 4 GB'
        cpu.processors='>= 2'
    - name: TIMEOUT
      value: "120"
