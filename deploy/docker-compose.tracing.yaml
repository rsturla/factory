# Development/testing only. Do not use these credentials in production.
services:
  # Jaeger all-in-one for trace visualization.
  # UI: http://localhost:16686
  # OTLP HTTP receiver: http://jaeger:4318
  jaeger:
    image: docker.io/jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"   # Jaeger UI
      - "4318:4318"     # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:16686/ || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 10

  postgres:
    image: quay.io/hummingbird/postgresql:18
    environment:
      POSTGRES_DB: factory
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: factory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factory"]
      interval: 2s
      timeout: 5s
      retries: 10

  admin:
    build:
      context: ..
      dockerfile: Containerfile
      args:
        BINARY: admin
    ports:
      - "18080:8080"
    environment:
      PG_DATABASE_URL: postgres://factory:factory@postgres:5432/factory?sslmode=disable  # sslmode=disable: dev only
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: factory-admin
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_healthy

  echo-receiver:
    build:
      context: ..
      dockerfile: Containerfile
      args:
        BINARY: receiver
    ports:
      - "8081:8081"
    environment:
      FACTORY_QUEUE_NAME: echo
      PG_DATABASE_URL: postgres://factory:factory@postgres:5432/factory?sslmode=disable  # sslmode=disable: dev only
      FACTORY_LISTEN_ADDR: ":8081"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: factory-receiver
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_healthy

  echo-dispatcher:
    build:
      context: ..
      dockerfile: Containerfile
      args:
        BINARY: dispatcher
    environment:
      FACTORY_QUEUE_NAME: echo
      PG_DATABASE_URL: postgres://factory:factory@postgres:5432/factory?sslmode=disable  # sslmode=disable: dev only
      RECONCILER_ENDPOINT: http://echo-reconciler:8082
      STORE_BACKEND: postgres
      COMPUTE_BACKEND: noop
      DISPATCH_MAX_CONCURRENCY: "5"
      DISPATCH_BATCH_SIZE: "5"
      DISPATCH_INTERVAL: 2s
      DISPATCH_LEASE_DURATION: 5m
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: factory-dispatcher
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_healthy
      echo-reconciler:
        condition: service_started

  echo-reconciler:
    build:
      context: ..
      dockerfile: examples/echo-reconciler/Containerfile
    environment:
      FACTORY_LISTEN_ADDR: ":8082"
      PROCESS_DELAY: 1s

volumes:
  pgdata:
