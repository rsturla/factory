services:
  postgres:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_DB: factory
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: factory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factory"]
      interval: 2s
      timeout: 5s
      retries: 10

  admin:
    build:
      context: ..
      dockerfile: Containerfile
      args:
        BINARY: admin
    ports:
      - "18080:8080"
    environment:
      DATABASE_URL: postgres://factory:factory@postgres:5432/factory?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  echo-receiver:
    build:
      context: ..
      dockerfile: Containerfile
      args:
        BINARY: receiver
    ports:
      - "8081:8081"
    environment:
      QUEUE_NAME: echo
      DATABASE_URL: postgres://factory:factory@postgres:5432/factory?sslmode=disable
      LISTEN_ADDR: ":8081"
    depends_on:
      postgres:
        condition: service_healthy

  echo-dispatcher:
    build:
      context: ..
      dockerfile: Containerfile
      args:
        BINARY: dispatcher
    environment:
      QUEUE_NAME: echo
      DATABASE_URL: postgres://factory:factory@postgres:5432/factory?sslmode=disable
      RECONCILER_ENDPOINT: http://echo-reconciler:8082
      STORE_BACKEND: postgres
      COMPUTE_BACKEND: noop
      MAX_CONCURRENCY: "100"
      BATCH_SIZE: "100"
      DISPATCH_INTERVAL: 100ms
      LEASE_DURATION: 5m
    depends_on:
      postgres:
        condition: service_healthy
      echo-reconciler:
        condition: service_started

  echo-reconciler:
    build:
      context: ..
      dockerfile: examples/echo-reconciler/Containerfile
    environment:
      LISTEN_ADDR: ":8082"
      PROCESS_DELAY: "0s"

volumes:
  pgdata:
