services:
  postgres:
    image: quay.io/hummingbird/postgresql:18
    environment:
      POSTGRES_DB: factory
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: factory
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factory"]
      interval: 2s
      timeout: 5s
      retries: 10

  prometheus:
    image: docker.io/prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yaml:/etc/prometheus/prometheus.yml:ro

  loki:
    image: docker.io/grafana/loki:latest
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: docker.io/grafana/promtail:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./observability/promtail.yaml:/etc/promtail/config.yml:ro
    depends_on:
      - loki

  perses:
    image: docker.io/persesdev/perses:latest
    ports:
      - "18090:8080"
    command: ["--config=/etc/perses/config.yaml"]
    volumes:
      - ./observability/perses-config.yaml:/etc/perses/config.yaml:ro
      - ./observability/perses-provisioning:/etc/perses/provisioning:ro

  jaeger:
    image: docker.io/jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  admin:
    build:
      context: ..
      dockerfile: Containerfile
      args:
        BINARY: admin
    labels:
      factory.component: admin
    ports:
      - "18080:8080"
    environment:
      DATABASE_URL: postgres://factory:factory@postgres:5432/factory?sslmode=disable
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: factory-admin
    depends_on:
      postgres:
        condition: service_healthy

  echo-receiver:
    build:
      context: ..
      dockerfile: Containerfile
      args:
        BINARY: receiver
    labels:
      factory.queue: echo
      factory.component: receiver
    ports:
      - "8081:8081"
    environment:
      QUEUE_NAME: echo
      DATABASE_URL: postgres://factory:factory@postgres:5432/factory?sslmode=disable
      LISTEN_ADDR: ":8081"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: factory-receiver
    depends_on:
      postgres:
        condition: service_healthy

  echo-dispatcher:
    build:
      context: ..
      dockerfile: Containerfile
      args:
        BINARY: dispatcher
    labels:
      factory.queue: echo
      factory.component: dispatcher
    environment:
      QUEUE_NAME: echo
      DATABASE_URL: postgres://factory:factory@postgres:5432/factory?sslmode=disable
      RECONCILER_ENDPOINT: http://echo-reconciler:8082
      STORE_BACKEND: postgres
      COMPUTE_BACKEND: noop
      MAX_CONCURRENCY: "100"
      BATCH_SIZE: "100"
      DISPATCH_INTERVAL: 1s
      SWEEP_INTERVAL: 15s
      LEASE_DURATION: 5m
      LISTEN_ADDR: ":8083"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318
      OTEL_SERVICE_NAME: factory-dispatcher
    depends_on:
      postgres:
        condition: service_healthy
      echo-reconciler:
        condition: service_started

  echo-reconciler:
    build:
      context: ..
      dockerfile: examples/echo-reconciler/Containerfile
    labels:
      factory.queue: echo
      factory.component: reconciler
    environment:
      LISTEN_ADDR: ":8082"
      PROCESS_DELAY: 500ms
