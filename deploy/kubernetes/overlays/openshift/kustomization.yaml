apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - route.yaml

patches:
  - path: service-patch.yaml
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: factory-admin

configMapGenerator:
  - name: factory-cedar-policies
    files:
      - factory.cedar
    options:
      disableNameSuffixHash: true

generatorOptions:
  disableNameSuffixHash: true
