apiVersion: apps/v1
kind: Deployment
metadata:
  name: factory-admin
  namespace: factory
  labels:
    app.kubernetes.io/name: factory-admin
    app.kubernetes.io/part-of: factory
    app.kubernetes.io/component: admin
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: factory-admin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: factory-admin
        app.kubernetes.io/part-of: factory
        app.kubernetes.io/component: admin
    spec:
      serviceAccountName: factory-admin
      containers:
        - name: admin
          image: quay.io/hummingbird/factory-admin:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: factory-db-app
                  key: uri
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability:4318
            - name: OTEL_SERVICE_NAME
              value: factory-admin
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: factory-admin
  namespace: factory
  labels:
    app.kubernetes.io/name: factory-admin
    app.kubernetes.io/part-of: factory
spec:
  selector:
    app.kubernetes.io/name: factory-admin
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: factory-admin
  namespace: factory
