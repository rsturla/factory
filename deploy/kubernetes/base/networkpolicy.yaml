# Only pods in the factory namespace can reach factory services.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: factory-internal
  namespace: factory
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: factory
  policyTypes:
    - Ingress
  ingress:
    # Allow traffic within the factory namespace.
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/part-of: factory
      ports:
        - port: 8080
        - port: 8081
        - port: 8082
    # Allow Prometheus scraping from the monitoring namespace.
    # Adjust the namespace label to match your cluster.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - port: 8080
        - port: 8081
