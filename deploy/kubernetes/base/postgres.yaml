apiVersion: v1
kind: Secret
metadata:
  name: factory-db
type: Opaque
stringData:
  uri: postgresql://factory:factory@factory-db:5432/factory?sslmode=disable
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: factory-db
  labels:
    app.kubernetes.io/name: factory-db
    app.kubernetes.io/part-of: factory
  annotations:
    kubernetes.io/reclaimPolicy: Delete
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: aws-ebs
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: factory-db
  labels:
    app.kubernetes.io/name: factory-db
    app.kubernetes.io/part-of: factory
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: factory-db
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: factory-db
  labels:
    app.kubernetes.io/name: factory-db
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: factory
spec:
  serviceName: factory-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: factory-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: factory-db
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: factory
    spec:
      containers:
        - name: postgres
          image: quay.io/hummingbird/postgresql:18
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: factory
            - name: POSTGRES_USER
              value: factory
            - name: POSTGRES_PASSWORD
              value: factory
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
            - name: run
              mountPath: /var/run/postgresql
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "factory"]
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "factory"]
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: factory-db
        - name: run
          emptyDir: {}
