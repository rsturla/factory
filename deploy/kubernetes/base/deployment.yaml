apiVersion: apps/v1
kind: Deployment
metadata:
  name: factory-admin
  labels:
    app.kubernetes.io/name: factory-admin
    app.kubernetes.io/component: admin
    app.kubernetes.io/part-of: factory
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: factory-admin
  template:
    metadata:
      labels:
        app.kubernetes.io/name: factory-admin
        app.kubernetes.io/component: admin
        app.kubernetes.io/part-of: factory
    spec:
      serviceAccountName: factory-admin
      containers:
        - name: admin
          image: quay.io/hummingbird/factory-admin:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: factory-db
                  key: uri
            - name: AUTHZ_BACKEND
              value: noop
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
