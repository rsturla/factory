apiVersion: apps/v1
kind: Deployment
metadata:
  name: factory-echo-dispatcher
  namespace: factory
  labels:
    app.kubernetes.io/name: factory-echo-dispatcher
    app.kubernetes.io/part-of: factory
    app.kubernetes.io/component: dispatcher
    factory.hummingbird.io/queue: echo
spec:
  # Singleton — only one dispatcher per queue.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: factory-echo-dispatcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: factory-echo-dispatcher
        app.kubernetes.io/part-of: factory
        app.kubernetes.io/component: dispatcher
        factory.hummingbird.io/queue: echo
    spec:
      serviceAccountName: factory-echo
      containers:
        - name: dispatcher
          image: quay.io/hummingbird/factory-dispatcher:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: QUEUE_NAME
              value: echo
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: factory-db-app
                  key: uri
            - name: RECONCILER_ENDPOINT
              value: http://factory-echo-reconciler:8082
            - name: COMPUTE_BACKEND
              value: noop
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MAX_CONCURRENCY
              value: "100"
            - name: BATCH_SIZE
              value: "50"
            - name: DISPATCH_INTERVAL
              value: 200ms
            - name: LEASE_DURATION
              value: 1h
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability:4318
            - name: OTEL_SERVICE_NAME
              value: factory-echo-dispatcher
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: factory-echo-dispatcher
  namespace: factory
  labels:
    app.kubernetes.io/name: factory-echo-dispatcher
    app.kubernetes.io/part-of: factory
spec:
  selector:
    app.kubernetes.io/name: factory-echo-dispatcher
  ports:
    - name: http
      port: 8080
      targetPort: http
