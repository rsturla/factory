apiVersion: apps/v1
kind: Deployment
metadata:
  name: factory-echo-reconciler
  namespace: factory
  labels:
    app.kubernetes.io/name: factory-echo-reconciler
    app.kubernetes.io/part-of: factory
    app.kubernetes.io/component: reconciler
    factory.hummingbird.io/queue: echo
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: factory-echo-reconciler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: factory-echo-reconciler
        app.kubernetes.io/part-of: factory
        app.kubernetes.io/component: reconciler
        factory.hummingbird.io/queue: echo
    spec:
      serviceAccountName: factory-echo
      terminationGracePeriodSeconds: 60
      containers:
        - name: reconciler
          image: quay.io/hummingbird/echo-reconciler:latest
          ports:
            - name: http
              containerPort: 8082
          env:
            - name: LISTEN_ADDR
              value: ":8082"
            - name: PROCESS_DELAY
              value: "0s"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: factory-echo-reconciler
  namespace: factory
  labels:
    app.kubernetes.io/name: factory-echo-reconciler
    app.kubernetes.io/part-of: factory
spec:
  selector:
    app.kubernetes.io/name: factory-echo-reconciler
  ports:
    - name: http
      port: 8082
      targetPort: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: factory-echo-reconciler
  namespace: factory
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: factory-echo-reconciler
  minReplicas: 2
  maxReplicas: 100
  metrics:
    - type: Pods
      pods:
        metric:
          name: factory_queue_depth
          selector:
            matchLabels:
              queue: echo
              status: pending
        target:
          type: AverageValue
          averageValue: "5"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 10
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 5
          periodSeconds: 60
