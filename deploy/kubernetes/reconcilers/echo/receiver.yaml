apiVersion: apps/v1
kind: Deployment
metadata:
  name: factory-echo-receiver
  namespace: factory
  labels:
    app.kubernetes.io/name: factory-echo-receiver
    app.kubernetes.io/part-of: factory
    app.kubernetes.io/component: receiver
    factory.hummingbird.io/queue: echo
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: factory-echo-receiver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: factory-echo-receiver
        app.kubernetes.io/part-of: factory
        app.kubernetes.io/component: receiver
        factory.hummingbird.io/queue: echo
    spec:
      serviceAccountName: factory-echo
      containers:
        - name: receiver
          image: quay.io/hummingbird/factory-receiver:latest
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: QUEUE_NAME
              value: echo
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: factory-db-app
                  key: uri
            - name: LISTEN_ADDR
              value: ":8081"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: http://otel-collector.observability:4318
            - name: OTEL_SERVICE_NAME
              value: factory-echo-receiver
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: factory-echo-receiver
  namespace: factory
  labels:
    app.kubernetes.io/name: factory-echo-receiver
    app.kubernetes.io/part-of: factory
spec:
  selector:
    app.kubernetes.io/name: factory-echo-receiver
  ports:
    - name: http
      port: 8081
      targetPort: http
