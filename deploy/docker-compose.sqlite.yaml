# Development/testing only. Do not use these credentials in production.
services:
  # SQLite backend — single-node deployment, no external database needed.
  # The dispatcher stores the queue in a local SQLite file on a named volume.

  echo-dispatcher:
    build:
      context: ..
      dockerfile: Containerfile
      args:
        BINARY: dispatcher
    ports:
      - "8083:8083"
    volumes:
      - sqlitedata:/tmp
    environment:
      FACTORY_QUEUE_NAME: echo
      STORE_BACKEND: sqlite
      SQLITE_PATH: /tmp/factory.db
      RECONCILER_ENDPOINT: http://echo-reconciler:8082
      FACTORY_LISTEN_ADDR: ":8083"
      DISPATCH_MAX_CONCURRENCY: "5"
      DISPATCH_BATCH_SIZE: "5"
      DISPATCH_INTERVAL: 2s
      DISPATCH_LEASE_DURATION: 5m
    depends_on:
      echo-reconciler:
        condition: service_started

  # SQLite receiver shares the same database file.
  echo-receiver:
    build:
      context: ..
      dockerfile: Containerfile
      args:
        BINARY: receiver
    ports:
      - "8081:8081"
    volumes:
      - sqlitedata:/tmp
    environment:
      FACTORY_QUEUE_NAME: echo
      STORE_BACKEND: sqlite
      SQLITE_PATH: /tmp/factory.db
      FACTORY_LISTEN_ADDR: ":8081"
    depends_on:
      echo-dispatcher:
        condition: service_started

  echo-reconciler:
    build:
      context: ..
      dockerfile: examples/echo-reconciler/Containerfile
    environment:
      FACTORY_LISTEN_ADDR: ":8082"
      PROCESS_DELAY: 2s

volumes:
  sqlitedata:
