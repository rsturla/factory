name: Fuzz

on:
  schedule:
    - cron: "0 4 * * *" # nightly at 04:00 UTC
  workflow_dispatch: {}

jobs:
  discover:
    name: Discover fuzz targets
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Find all Fuzz* functions
        id: targets
        run: |
          matrix=$(grep -rn '^func Fuzz' --include='*_fuzz_test.go' . \
            | sed 's|^\./||' \
            | while IFS=: read -r file line func_line; do
                dir=$(dirname "$file")/
                target=$(echo "$func_line" | sed 's/func \(Fuzz[A-Za-z0-9_]*\).*/\1/')
                # Determine Go module root for sub-modules (e.g., pkg/sdk)
                workdir="."
                case "$dir" in
                  pkg/sdk/*|pkg/sdk/) workdir="pkg/sdk" ;;
                esac
                if [ "$workdir" = "." ]; then
                  pkg="./$dir"
                else
                  pkg="./"
                fi
                printf '%s\t%s\t%s\n' "$pkg" "$target" "$workdir"
              done \
            | jq -Rnc '{include: [inputs | split("\t") | {pkg: .[0], target: .[1], workdir: .[2]}]}')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  fuzz:
    name: ${{ matrix.target }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Restore fuzz corpus
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cache/go-build/fuzz
          key: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Fuzz ${{ matrix.target }}
        working-directory: ${{ matrix.workdir }}
        run: go test ${{ matrix.pkg }} -fuzz=${{ matrix.target }} -fuzztime=60s -v

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: crash-${{ matrix.target }}
          path: |
            **/testdata/fuzz/${{ matrix.target }}/
          retention-days: 30
