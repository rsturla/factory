name: Fuzz

on:
  schedule:
    - cron: "0 4 * * *" # nightly at 04:00 UTC
  workflow_dispatch: {}

jobs:
  discover:
    name: Discover fuzz targets
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.targets.outputs.matrix }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Find all Fuzz* functions
        id: targets
        run: |
          matrix=$(grep -rn '^func Fuzz' --include='*_fuzz_test.go' . \
            | sed 's|^\./||' \
            | while IFS=: read -r file line func_line; do
                dir=$(dirname "$file")/
                target=$(echo "$func_line" | sed 's/func \(Fuzz[A-Za-z0-9_]*\).*/\1/')
                printf '%s\t%s\n' "./$dir" "$target"
              done \
            | jq -Rnc '{include: [inputs | split("\t") | {pkg: .[0], target: .[1]}]}')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  fuzz:
    name: ${{ matrix.target }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Restore fuzz corpus
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/go-build/fuzz
          key: fuzz-corpus-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            fuzz-corpus-${{ matrix.target }}-

      - name: Fuzz ${{ matrix.target }}
        run: go test ${{ matrix.pkg }} -fuzz=${{ matrix.target }} -fuzztime=60s -v

      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: crash-${{ matrix.target }}
          path: |
            **/testdata/fuzz/${{ matrix.target }}/
          retention-days: 30
