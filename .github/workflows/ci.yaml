name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: factory
          POSTGRES_USER: factory
          POSTGRES_PASSWORD: factory
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U factory"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: gofmt -l . | tee /dev/stderr | (! read)
        name: Check formatting
      - run: go vet ./...
        name: Vet
      - run: go test -v -count=1 -timeout 120s ./...
        name: Test
        env:
          DATABASE_URL: postgres://factory:factory@localhost:5432/factory?sslmode=disable
