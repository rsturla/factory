name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: quay.io/hummingbird/postgresql:18
        env:
          POSTGRES_DB: factory
          POSTGRES_USER: factory
          POSTGRES_PASSWORD: factory
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U factory"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
      dynamodb:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000
      rustfs:
        image: rustfs/rustfs:latest
        ports:
          - 9000:9000
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Create S3 test bucket
        run: |
          AWS_ACCESS_KEY_ID=rustfsadmin AWS_SECRET_ACCESS_KEY=rustfsadmin \
            aws --endpoint-url http://localhost:9000 s3 mb s3://factory-test
      - run: gofmt -l . | tee /dev/stderr | (! read)
        name: Check formatting
      - run: go vet ./...
        name: Vet
      - run: go vet ./...
        name: Vet SDK module
        working-directory: sdk/go/reconciler
      - run: go test -v -race -count=1 -timeout 120s ./...
        name: Test
        env:
          PG_DATABASE_URL: postgres://factory:factory@localhost:5432/factory?sslmode=disable
          DDB_TEST_ENDPOINT: http://localhost:8000
          S3_TEST_ENDPOINT: http://localhost:9000
          S3_TEST_BUCKET: factory-test
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
      - run: go test -v -race -count=1 -timeout 30s ./...
        name: Test SDK module
        working-directory: sdk/go/reconciler
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.13"
      - name: Test Python SDK
        working-directory: sdk/python
        run: |
          pip install -e ".[dev]" -q
          pytest -v
      - name: Test Rust SDK
        working-directory: sdk/rust
        run: |
          rustup component add clippy
          cargo test
          cargo clippy -- -D warnings
