name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: factory
          POSTGRES_USER: factory
          POSTGRES_PASSWORD: factory
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U factory"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 10
      dynamodb:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000
      rustfs:
        image: rustfs/rustfs:latest
        ports:
          - 9000:9000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Create S3 test bucket
        run: |
          AWS_ACCESS_KEY_ID=rustfsadmin AWS_SECRET_ACCESS_KEY=rustfsadmin \
            aws --endpoint-url http://localhost:9000 s3 mb s3://factory-test
      - run: gofmt -l . | tee /dev/stderr | (! read)
        name: Check formatting
      - run: go vet ./...
        name: Vet
      - run: go test -v -count=1 -timeout 120s ./...
        name: Test
        env:
          DATABASE_URL: postgres://factory:factory@localhost:5432/factory?sslmode=disable
          DDB_TEST_ENDPOINT: http://localhost:8000
          S3_TEST_ENDPOINT: http://localhost:9000
          S3_TEST_BUCKET: factory-test
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: us-east-1
