version: v2
managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: gitlab.com/redhat/hummingbird/experimental/factory/core/gen
plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: gen
    opt:
      - paths=source_relative
