apiVersion: apps/v1
kind: Deployment
metadata:
  name: factory-pipeline-controller
  namespace: factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: factory-pipeline-controller
  template:
    metadata:
      labels:
        app: factory-pipeline-controller
    spec:
      serviceAccountName: factory-pipeline-controller
      containers:
      - name: controller
        image: quay.io/hummingbird/factory-pipeline-controller:latest
        env:
        - name: FACTORY_API_ENDPOINT
          value: "http://factory-api:8080"
        - name: PIPELINE_DEPLOYMENTS
          valueFrom:
            configMapKeyRef:
              name: pipeline-deployments
              key: deployments.json
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: factory-pipeline-controller
  namespace: factory
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: factory-pipeline-controller
  namespace: factory
rules:
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["create", "get", "list", "watch", "delete"]
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: factory-pipeline-controller
  namespace: factory
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: factory-pipeline-controller
subjects:
- kind: ServiceAccount
  name: factory-pipeline-controller
  namespace: factory
