apiVersion: apps/v1
kind: Deployment
metadata:
  name: factory-dispatcher
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: factory-dispatcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: factory-dispatcher
        app.kubernetes.io/component: dispatcher
    spec:
      containers:
        - name: dispatcher
          image: quay.io/hummingbird/factory-dispatcher
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PG_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: factory-db
                  key: uri
            - name: FACTORY_LISTEN_ADDR
              value: ":8080"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
