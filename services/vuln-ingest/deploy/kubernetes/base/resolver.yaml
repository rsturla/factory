apiVersion: apps/v1
kind: Deployment
metadata:
  name: vuln-ingest-resolver
  labels:
    app.kubernetes.io/name: vuln-ingest-resolver
    app.kubernetes.io/component: reconciler
    app.kubernetes.io/part-of: vuln-ingest
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: vuln-ingest-resolver
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vuln-ingest-resolver
        app.kubernetes.io/component: reconciler
        app.kubernetes.io/part-of: vuln-ingest
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: resolver
          image: quay.io/hummingbird/vuln-ingest-resolver
          ports:
            - name: http
              containerPort: 8082
          env:
            - name: LISTEN_ADDR
              value: ":8082"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: vulndb
                  key: uri
            - name: DATA_DIR
              value: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: vulndata
              mountPath: /data
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: vulndata
          persistentVolumeClaim:
            claimName: vulndata
---
apiVersion: v1
kind: Service
metadata:
  name: vuln-ingest-resolver
  labels:
    app.kubernetes.io/name: vuln-ingest-resolver
    app.kubernetes.io/part-of: vuln-ingest
spec:
  selector:
    app.kubernetes.io/name: vuln-ingest-resolver
  ports:
    - name: http
      port: 8082
      targetPort: http
