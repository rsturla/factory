apiVersion: apps/v1
kind: Deployment
metadata:
  name: vuln-ingest-fetcher
  labels:
    app.kubernetes.io/name: vuln-ingest-fetcher
    app.kubernetes.io/component: reconciler
    app.kubernetes.io/part-of: vuln-ingest
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vuln-ingest-fetcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vuln-ingest-fetcher
        app.kubernetes.io/component: reconciler
        app.kubernetes.io/part-of: vuln-ingest
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: fetcher
          image: quay.io/hummingbird/vuln-ingest-fetcher
          ports:
            - name: http
              containerPort: 8082
          env:
            - name: LISTEN_ADDR
              value: ":8082"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: vulndb
                  key: uri
            - name: DATA_DIR
              value: /data
            - name: RECEIVER_URL
              value: http://vuln-ingest-receiver-resolve:8080
            - name: RESOLVE_QUEUE
              value: vuln-resolve
          resources:
            requests:
              cpu: 200m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: vulndata
              mountPath: /data
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: vulndata
          persistentVolumeClaim:
            claimName: vulndata
---
apiVersion: v1
kind: Service
metadata:
  name: vuln-ingest-fetcher
  labels:
    app.kubernetes.io/name: vuln-ingest-fetcher
    app.kubernetes.io/part-of: vuln-ingest
spec:
  selector:
    app.kubernetes.io/name: vuln-ingest-fetcher
  ports:
    - name: http
      port: 8082
      targetPort: http
