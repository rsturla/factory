apiVersion: batch/v1
kind: CronJob
metadata:
  name: vuln-ingest-git-mirror
  labels:
    app.kubernetes.io/name: vuln-ingest-git-mirror
    app.kubernetes.io/component: git-mirror
    app.kubernetes.io/part-of: vuln-ingest
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 600
      backoffLimit: 3
      template:
        metadata:
          labels:
            app.kubernetes.io/name: vuln-ingest-git-mirror
            app.kubernetes.io/component: git-mirror
            app.kubernetes.io/part-of: vuln-ingest
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: git-mirror
              image: quay.io/hummingbird/vuln-ingest-git-mirror
              env:
                - name: DATA_DIR
                  value: /data
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: false
                capabilities:
                  drop: [ALL]
              volumeMounts:
                - name: vulndata
                  mountPath: /data
          volumes:
            - name: vulndata
              persistentVolumeClaim:
                claimName: vulndata
