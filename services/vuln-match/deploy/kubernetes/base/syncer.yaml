apiVersion: batch/v1
kind: CronJob
metadata:
  name: vuln-match-syncer
  labels:
    app.kubernetes.io/name: vuln-match-syncer
    app.kubernetes.io/component: syncer
    app.kubernetes.io/part-of: vuln-match
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 600
      template:
        metadata:
          labels:
            app.kubernetes.io/name: vuln-match-syncer
            app.kubernetes.io/component: syncer
            app.kubernetes.io/part-of: vuln-match
        spec:
          automountServiceAccountToken: false
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: syncer
              image: quay.io/hummingbird/vuln-match-syncer
              command: ["vuln-match-syncer"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: matchdb
                      key: uri
                - name: CATALOG_DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: catalogdb
                      key: uri
                - name: VULN_DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: vulndb
                      key: uri
                - name: RECEIVER_URL
                  value: http://vuln-match-receiver:8080
                - name: MATCH_QUEUE
                  value: vuln-match
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: [ALL]
