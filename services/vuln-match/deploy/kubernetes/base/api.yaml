apiVersion: apps/v1
kind: Deployment
metadata:
  name: vuln-match-api
  labels:
    app.kubernetes.io/name: vuln-match-api
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: vuln-match
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vuln-match-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vuln-match-api
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: vuln-match
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: quay.io/hummingbird/vuln-match-api
          command: ["vuln-match-api"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: LISTEN_ADDR
              value: ":8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: matchdb
                  key: uri
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: vuln-match-api
  labels:
    app.kubernetes.io/name: vuln-match-api
    app.kubernetes.io/part-of: vuln-match
spec:
  selector:
    app.kubernetes.io/name: vuln-match-api
  ports:
    - port: 8080
      targetPort: http
      name: http
