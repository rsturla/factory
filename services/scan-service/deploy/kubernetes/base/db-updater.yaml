apiVersion: apps/v1
kind: Deployment
metadata:
  name: scan-db-updater
  labels:
    app.kubernetes.io/name: scan-db-updater
    app.kubernetes.io/component: db-updater
    app.kubernetes.io/part-of: scan-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scan-db-updater
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scan-db-updater
        app.kubernetes.io/component: db-updater
        app.kubernetes.io/part-of: scan-service
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: db-updater
          image: quay.io/hummingbird/scan-db-updater
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: LISTEN_ADDR
              value: ":8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: scandb
                  key: uri
            - name: GRYPE_DB_DIR
              value: /data/grypedb
            - name: CATALOG_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: catalogdb
                  key: uri
            - name: RECEIVER_URL
              value: http://scan-receiver:8080
            - name: SCAN_QUEUE
              value: scan
            - name: CHECK_INTERVAL
              value: "1h"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: grypedb
              mountPath: /data/grypedb
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: grypedb
          persistentVolumeClaim:
            claimName: grypedb
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
