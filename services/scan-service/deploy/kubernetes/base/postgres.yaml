apiVersion: v1
kind: Secret
metadata:
  name: scandb
type: Opaque
stringData:
  uri: postgresql://scandb:scandb@scandb:5432/scandb?sslmode=disable
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: scandb
  labels:
    app.kubernetes.io/name: scandb
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: scan-service
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: scandb
  labels:
    app.kubernetes.io/name: scandb
    app.kubernetes.io/part-of: scan-service
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: scandb
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: scandb
  labels:
    app.kubernetes.io/name: scandb
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: scan-service
spec:
  serviceName: scandb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: scandb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: scandb
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: scan-service
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: quay.io/hummingbird/postgresql:18
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: scandb
            - name: POSTGRES_USER
              value: scandb
            - name: POSTGRES_PASSWORD
              value: scandb
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            - name: POSTGRES_MAX_CONNECTIONS
              value: "300"
            - name: POSTGRES_SHARED_BUFFERS
              value: 512MB
            - name: POSTGRES_WORK_MEM
              value: 16MB
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql
            - name: run
              mountPath: /var/run/postgresql
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "scandb"]
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "scandb"]
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: scandb
        - name: run
          emptyDir: {}
