apiVersion: batch/v1
kind: CronJob
metadata:
  name: scan-syncer
  labels:
    app.kubernetes.io/name: scan-syncer
    app.kubernetes.io/component: syncer
    app.kubernetes.io/part-of: scan-service
spec:
  schedule: "0 */6 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 600
      backoffLimit: 3
      template:
        metadata:
          labels:
            app.kubernetes.io/name: scan-syncer
            app.kubernetes.io/component: syncer
            app.kubernetes.io/part-of: scan-service
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: syncer
              image: quay.io/hummingbird/scan-syncer
              env:
                - name: CATALOG_DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: catalogdb
                      key: uri
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: scandb
                      key: uri
                - name: RECEIVER_URL
                  value: http://scan-receiver:8080
                - name: SCAN_QUEUE
                  value: scan
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: [ALL]
