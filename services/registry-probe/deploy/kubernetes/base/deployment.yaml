apiVersion: apps/v1
kind: Deployment
metadata:
  name: registry-probe
  labels:
    app.kubernetes.io/name: registry-probe
    app.kubernetes.io/component: probe
    app.kubernetes.io/part-of: registry-probe
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: registry-probe
  template:
    metadata:
      labels:
        app.kubernetes.io/name: registry-probe
        app.kubernetes.io/component: probe
        app.kubernetes.io/part-of: registry-probe
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: probe
          image: quay.io/hummingbird/registry-probe
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: LISTEN_ADDR
              value: ":8080"
            - name: PROBE_IMAGE
              value: quay.io/hummingbird/core-runtime:latest
            - name: PROBE_INTERVAL
              value: "2m"
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: registry-probe
  labels:
    app.kubernetes.io/name: registry-probe
    app.kubernetes.io/part-of: registry-probe
spec:
  selector:
    app.kubernetes.io/name: registry-probe
  ports:
    - name: http
      port: 8080
      targetPort: http
