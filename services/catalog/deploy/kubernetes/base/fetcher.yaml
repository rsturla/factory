apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-fetcher
  labels:
    app.kubernetes.io/name: catalog-fetcher
    app.kubernetes.io/component: reconciler
    app.kubernetes.io/part-of: catalog
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog-fetcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog-fetcher
        app.kubernetes.io/component: reconciler
        app.kubernetes.io/part-of: catalog
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: fetcher
          image: quay.io/hummingbird/catalog-fetcher
          ports:
            - name: http
              containerPort: 8082
          env:
            - name: LISTEN_ADDR
              value: ":8082"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: catalogdb
                  key: uri
            - name: BLOB_BACKEND
              value: local
            - name: BLOB_LOCAL_DIR
              value: /data/sboms
            - name: ANALYZE_RECEIVER_URL
              value: http://catalog-receiver-analyze:8080
            - name: ANALYZE_QUEUE
              value: catalog-analyze
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: sboms
              mountPath: /data/sboms
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 2Gi
        - name: sboms
          persistentVolumeClaim:
            claimName: catalog-sboms
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-fetcher
  labels:
    app.kubernetes.io/name: catalog-fetcher
    app.kubernetes.io/part-of: catalog
spec:
  selector:
    app.kubernetes.io/name: catalog-fetcher
  ports:
    - name: http
      port: 8082
      targetPort: http
