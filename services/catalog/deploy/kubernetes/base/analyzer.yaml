apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-analyzer
  labels:
    app.kubernetes.io/name: catalog-analyzer
    app.kubernetes.io/component: reconciler
    app.kubernetes.io/part-of: catalog
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog-analyzer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog-analyzer
        app.kubernetes.io/component: reconciler
        app.kubernetes.io/part-of: catalog
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: analyzer
          image: quay.io/hummingbird/catalog-analyzer
          ports:
            - name: http
              containerPort: 8082
          env:
            - name: LISTEN_ADDR
              value: ":8082"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: catalogdb
                  key: uri
            - name: BLOB_BACKEND
              value: local
            - name: BLOB_LOCAL_DIR
              value: /data/sboms
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: sboms
              mountPath: /data/sboms
              readOnly: true
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
      volumes:
        - name: sboms
          persistentVolumeClaim:
            claimName: catalog-sboms
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-analyzer
  labels:
    app.kubernetes.io/name: catalog-analyzer
    app.kubernetes.io/part-of: catalog
spec:
  selector:
    app.kubernetes.io/name: catalog-analyzer
  ports:
    - name: http
      port: 8082
      targetPort: http
