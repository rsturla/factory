apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-discoverer
  labels:
    app.kubernetes.io/name: catalog-discoverer
    app.kubernetes.io/component: reconciler
    app.kubernetes.io/part-of: catalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog-discoverer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog-discoverer
        app.kubernetes.io/component: reconciler
        app.kubernetes.io/part-of: catalog
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: discoverer
          image: quay.io/hummingbird/catalog-discoverer
          ports:
            - name: http
              containerPort: 8082
          env:
            - name: LISTEN_ADDR
              value: ":8082"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: catalogdb
                  key: uri
            - name: FETCH_RECEIVER_URL
              value: http://catalog-receiver-fetch:8080
            - name: DISCOVER_RECEIVER_URL
              value: http://catalog-receiver-discover:8080
            - name: FETCH_QUEUE
              value: catalog-fetch
            - name: DISCOVER_QUEUE
              value: catalog-discover
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-discoverer
  labels:
    app.kubernetes.io/name: catalog-discoverer
    app.kubernetes.io/part-of: catalog
spec:
  selector:
    app.kubernetes.io/name: catalog-discoverer
  ports:
    - name: http
      port: 8082
      targetPort: http
