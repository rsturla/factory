apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-dispatcher-discover
  labels:
    app.kubernetes.io/name: catalog-dispatcher-discover
    app.kubernetes.io/component: dispatcher
    app.kubernetes.io/part-of: catalog
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog-dispatcher-discover
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog-dispatcher-discover
        app.kubernetes.io/component: dispatcher
        app.kubernetes.io/part-of: catalog
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: dispatcher
          image: quay.io/hummingbird/factory-dispatcher
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PG_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: factory-db
                  key: uri
            - name: FACTORY_LISTEN_ADDR
              value: ":8080"
            - name: FACTORY_QUEUE_NAME
              value: catalog-discover
            - name: RECONCILER_ENDPOINT
              value: http://catalog-discoverer:8082
            - name: DISPATCH_MAX_CONCURRENCY
              value: "5"
            - name: DISPATCH_BATCH_SIZE
              value: "5"
            - name: DISPATCH_LEASE_DURATION
              value: "30m"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
