apiVersion: batch/v1
kind: CronJob
metadata:
  name: catalog-syncer
  labels:
    app.kubernetes.io/name: catalog-syncer
    app.kubernetes.io/component: syncer
    app.kubernetes.io/part-of: catalog
spec:
  schedule: "*/15 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 300
      backoffLimit: 3
      template:
        metadata:
          labels:
            app.kubernetes.io/name: catalog-syncer
            app.kubernetes.io/component: syncer
            app.kubernetes.io/part-of: catalog
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          securityContext:
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: syncer
              image: quay.io/hummingbird/catalog-syncer
              env:
                - name: RECEIVER_URL
                  value: http://catalog-receiver-discover:8080
                - name: DISCOVER_QUEUE
                  value: catalog-discover
                - name: IMAGES
                  value: ""
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: [ALL]
